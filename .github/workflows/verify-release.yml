name: verify-release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Import release public key
        run: gpg --batch --import keys/Uwohali_Tuccio_0x8C8CB0D48C7F60DA_public.asc
      - name: Verify manifest and detached signatures
        shell: bash
        run: |
          set -euo pipefail
          cd releases/v1.1.2-genesis
          sha256sum -c SHA256_SUMS.txt
          while IFS= read -r -d '' signature; do
            target="${signature%.asc}"
            if [[ -f "$target" ]]; then
              gpg --batch --verify "$signature" "$target"
            fi
          done < <(find . -type f -name '*.asc' -print0)

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Gitleaks verified binary
        shell: bash
        run: |
          set -euo pipefail
          VER=8.21.2
          ARCHIVE="gitleaks_${VER}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/${ARCHIVE}"
          echo "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba  $ARCHIVE" \
            | sha256sum --check
          tar -xzf "$ARCHIVE" gitleaks
          ./gitleaks detect --no-git --source . --redact
